<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0E1730"/>
      <stop offset="0.55" stop-color="#0A1022"/>
      <stop offset="1" stop-color="#060912"/>
    </linearGradient>
    <radialGradient id="sheenbg" cx="0.5" cy="0.26" r="0.75">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0.05" y1="0.0" x2="0.95" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="ringShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="g1" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="g2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <!-- background + bezel -->
  <rect width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect width="480" height="480" rx="116" fill="url(#sheenbg)"/>
  <rect x="1.5" y="1.5" width="477" height="477" rx="114.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <g transform="translate(0,-2)">
    <!-- restrained glow -->
    <g opacity="0.30" filter="url(#g1)">
      <circle cx="232" cy="228" r="118" fill="none" stroke="url(#ring)" stroke-width="22"/>
      <path d="M186 232 L222 268 L280 174" fill="none" stroke="url(#check)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ground shadow -->
    <ellipse cx="234" cy="392" rx="112" ry="16" fill="#000000" opacity="0.38" filter="url(#g1)"/>

    <!-- coin: outer hairline, main ring, bevel overlay, inner hairline -->
    <circle cx="232" cy="228" r="130" fill="none" stroke="#0A0F20" stroke-opacity="0.85" stroke-width="2"/>
    <circle cx="232" cy="228" r="118" fill="none" stroke="url(#ring)" stroke-width="22"/>
    <circle cx="232" cy="228" r="118" fill="none" stroke="url(#ringShade)" stroke-width="22"/>
    <circle cx="232" cy="228" r="95"  fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.5"/>

    <!-- top glass sheen on the ring -->
    <path d="M127 180 A118 118 0 0 1 337 180" fill="none" stroke="url(#sheen)" stroke-width="7" stroke-linecap="round" opacity="0.65" filter="url(#g2)"/>

    <!-- Q tail (connects to ring at lower-right) -->
    <line x1="309" y1="305" x2="374" y2="370" stroke="url(#ring)" stroke-width="22" stroke-linecap="round"/>
    <line x1="313" y1="309" x2="360" y2="356" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="4.5" stroke-linecap="round"/>

    <!-- settled check inside the Q -->
    <path d="M186 232 L222 268 L280 174" fill="none" stroke="url(#check)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M186 232 L222 268 L280 174" fill="none" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
